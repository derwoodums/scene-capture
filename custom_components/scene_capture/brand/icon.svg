  <!-- Bulb screw base -->
  <rect x="108" y="194" width="40" height="9" rx="2" fill="#616161"/>
  <rect x="111" y="205" width="34" height="7" rx="2" fill="#616161"/>
  <path d="M 116 214 L 140 214 L 134 222 L 122 222 Z" fill="#424242"/>

  <!-- Filament -->
